app:
  name: tron-watcher
  mode: hd_wallet
  hd_wallet_count: 10000
  local: false
mysql:
  dsn: ""
  max_open_conns: 20
  max_idle_conns: 10
  conn_max_lifetime_seconds: 300
  session_time_zone: "+08:00"

quicknode:
  http_url: ""
  wss_url: ""
  usdt_contract: "TR7NHqjeKQxGTCi8q8ZY4pL8otSzgjLj6t"

web:
  listen: ":8080"
  username: "admin"
  password: "change_me_123456"
  session_name: "tron_watcher_session"
  api_key: "change_me_api_key"

telegram:
  enabled: false
  bot_token: "change_me_bot_token"
  chat_id: "change_me_chat_id"
  api_base_url: "https://api.telegram.org"
  timeout_seconds: 5
  queue_size: 256
  min_amount: "1"

callback:
  enabled: false
  url: "https://your-callback-host/notify"
  timeout_seconds: 5
  queue_size: 256
  min_amount: "1"

energy:
  provider: "trxfee"

trxfee:
  url: "https://your-trxfee-api-host"
  api_key: "your_trxfee_api_key"
  api_secret: "your_trxfee_api_secret"

catfee:
  url: "https://your-catfee-api-host"
  api_key: "your_catfee_api_key"
  api_secret: "your_catfee_api_secret"

watcher:
  address_reload_interval_seconds: 15
  block_poll_interval_seconds: 3
  tron_block_source: "head"
  confirmations: 0
  start_block: 0
  tx_workers: 8

bsc:
  rpc_http_url: "https://your-bsc-rpc-host"
  rpc_wss_url: ""
  usdt_contract: "0x55d398326f99059fF775485246999027B3197955"
  start_block: 0
  block_poll_interval_seconds: 3
  confirmations: 0
